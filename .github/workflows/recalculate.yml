name: Recalcular ranking

on:
  push:
    branches: [main]
    paths:
      - 'pronosticos/**'          # Daniel sube un nuevo pronóstico
      - 'data/resultados_reales*' # o corrige un resultado a mano
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: porra-scoring
  cancel-in-progress: false

jobs:
  recalculate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install openpyxl requests

      - name: Descargar pronosticos del formulario (Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/supabase_pull.py

      - name: Calcular puntos
        run: python scripts/scorer.py

      - name: Commit dashboard/data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resultados_reales.xlsx data/resultados_reales_elim.xlsx dashboard/data.json dashboard/index.html dashboard/dashboard.html
          git diff --staged --quiet && echo "Sin cambios" || \
            git commit -m "ranking: recalculado $(date -u '+%Y-%m-%d %H:%M UTC')" && \
            git push
