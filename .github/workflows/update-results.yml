name: Actualizar resultados automáticamente

on:
  schedule:
    # Cada 15 min durante el torneo (11 jun – 19 jul 2026).
    # fetch_results.py solo llama a la API cuando un partido acaba de terminar
    # y aún no tiene resultado, así que la mayoría de ejecuciones no consumen cuota.
    - cron: '*/15 * * * *'
  workflow_dispatch:   # también se puede lanzar a mano desde GitHub (fuerza la llamada)

permissions:
  contents: write

concurrency:
  group: porra-scoring
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install openpyxl requests

      - name: Descargar pronosticos del formulario (Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/supabase_pull.py

      - name: Descargar resultados de API-Football
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FORCE_FETCH: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: python scripts/fetch_results.py

      - name: Recalcular ranking
        run: python scripts/scorer.py

      - name: Commit si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resultados_reales.xlsx data/resultados_reales_elim.xlsx \
                  data/bracket.json \
                  dashboard/data.json dashboard/index.html dashboard/dashboard.html
          git diff --staged --quiet && echo "Sin cambios" || \
            git commit -m "auto: resultados $(date -u '+%Y-%m-%d %H:%M UTC')" && \
            git push
