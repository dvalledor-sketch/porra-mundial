name: Actualizar resultados automáticamente

on:
  schedule:
    # Cada hora durante el torneo (11 jun – 19 jul 2026)
    - cron: '5 * * * *'
  workflow_dispatch:   # también se puede lanzar a mano desde GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install openpyxl requests

      - name: Descargar resultados de API-Football
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: python scripts/fetch_results.py

      - name: Recalcular ranking
        run: python scripts/scorer.py

      - name: Commit si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resultados_reales.xlsx data/resultados_reales_elim.xlsx \
                  dashboard/data.json dashboard/index.html dashboard/dashboard.html
          git diff --staged --quiet && echo "Sin cambios" || \
            git commit -m "auto: resultados $(date -u '+%Y-%m-%d %H:%M UTC')" && \
            git push
