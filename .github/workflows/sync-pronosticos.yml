name: Sincronizar pronosticos del formulario

# Descarga los pronosticos enviados desde el formulario web (Supabase),
# recalcula el ranking y publica dashboard/data.json. Independiente de la
# API de resultados: asi los envios del formulario se reflejan aunque el
# torneo no haya empezado.

on:
  schedule:
    - cron: '*/15 * * * *'   # cada 15 minutos
  workflow_dispatch:          # o a mano desde GitHub -> Actions

permissions:
  contents: write

concurrency:
  group: porra-scoring
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install openpyxl requests

      - name: Descargar pronosticos del formulario (Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/supabase_pull.py

      - name: Recalcular ranking
        run: python scripts/scorer.py

      - name: Commit si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data.json dashboard/index.html dashboard/dashboard.html
          git diff --staged --quiet && echo "Sin cambios" || \
            git commit -m "sync: pronosticos del formulario $(date -u '+%Y-%m-%d %H:%M UTC')" && \
            git push
